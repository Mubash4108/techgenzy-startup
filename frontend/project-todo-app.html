    - Loops to display items

    - Event handling

<!DOCTYPE html>
<html>
<head>
    <title>Todo List App</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
        }
        
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 500px;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        h1 {
            color: #333;
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        #todoInput {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 16px;
            transition: border 0.3s;
        }
        
        #todoInput:focus {
            outline: none;
            border-color: #667eea;
        }
        
        #addBtn {
            padding: 12px 25px;
            background-color: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: background 0.3s;
        }
        
        #addBtn:hover {
            background-color: #764ba2;
        }
        
        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            padding: 15px;
            background-color: #f5f5f5;
            border-radius: 5px;
        }
        
        .stat {
            text-align: center;
        }
        
        .stat-number {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-label {
            color: #888;
            font-size: 12px;
        }
        
        #todoList {
            list-style: none;
        }
        
        .todo-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 15px;
            background-color: #f9f9f9;
            border-left: 4px solid #667eea;
            margin-bottom: 10px;
            border-radius: 3px;
            transition: all 0.3s;
        }
        
        .todo-item:hover {
            background-color: #f0f0f0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .todo-item.completed {
            opacity: 0.6;
        }
        
        .todo-item.completed .todo-text {
            text-decoration: line-through;
            color: #aaa;
        }
        
        .todo-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }
        
        .todo-text {
            flex: 1;
            color: #333;
            font-size: 16px;
        }
        
        .delete-btn {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }
        
        .delete-btn:hover {
            background-color: #c0392b;
        }
        
        .empty-message {
            text-align: center;
            color: #aaa;
            padding: 40px 20px;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>✓ Todo List</h1>
            <p>Keep track of your tasks</p>
        </header>
        
        <!-- Input section -->
        <div class="input-group">
            <input 
                type="text" 
                id="todoInput" 
                placeholder="Add a new task..."
                onkeypress="handleEnter(event)"
            >
            <button id="addBtn" onclick="addTodo()">Add</button>
        </div>
        
        <!-- Stats section -->
        <div class="stats">
            <div class="stat">
                <div class="stat-number" id="totalCount">0</div>
                <div class="stat-label">Total</div>
            </div>
            <div class="stat">
                <div class="stat-number" id="completeCount">0</div>
                <div class="stat-label">Done</div>
            </div>
            <div class="stat">
                <div class="stat-number" id="pendingCount">0</div>
                <div class="stat-label">Pending</div>
            </div>
        </div>
        
        <!-- Todo list -->
        <ul id="todoList"></ul>
        <div class="empty-message" id="emptyMessage">No tasks yet. Add one to get started! 🎯</div>
    </div>

    <script>
        // DATA: Store our todos here
        let todos = [];
        
        // FUNCTION: Add a new todo
        function addTodo() {
            const input = document.getElementById("todoInput");
            const text = input.value.trim();
            
            // Check if empty
            if (text === "") {
                alert("Please enter a task!");
                return;
            }
            
            // Create todo object
            const todo = {
                id: Date.now(),
                text: text,
                completed: false
            };
            
            // Add to array
            todos.push(todo);
            
            // Clear input
            input.value = "";
            input.focus();
            
            // Update display
            renderTodos();
            updateStats();
        }
        
        // FUNCTION: Delete a todo
        function deleteTodo(id) {
            todos = todos.filter(todo => todo.id !== id);
            renderTodos();
            updateStats();
        }
        
        // FUNCTION: Toggle todo complete
        function toggleTodo(id) {
            todos = todos.map(todo => {
                if (todo.id === id) {
                    return { ...todo, completed: !todo.completed };
                }
                return todo;
            });
            renderTodos();
            updateStats();
        }
        
        // FUNCTION: Display all todos
        function renderTodos() {
            const list = document.getElementById("todoList");
            const empty = document.getElementById("emptyMessage");
            
            list.innerHTML = "";
            
            if (todos.length === 0) {
                empty.style.display = "block";
                return;
            }
            
            empty.style.display = "none";
            
            todos.forEach(todo => {
                const li = document.createElement("li");
                li.className = "todo-item " + (todo.completed ? "completed" : "");
                
                li.innerHTML = `
                    <input 
                        type="checkbox" 
                        class="todo-checkbox"
                        ${todo.completed ? "checked" : ""}
                        onchange="toggleTodo(${todo.id})"
                    >
                    <span class="todo-text">${todo.text}</span>
                    <button class="delete-btn" onclick="deleteTodo(${todo.id})">Delete</button>
                `;
                
                list.appendChild(li);
            });
        }
        
        // FUNCTION: Update statistics
        function updateStats() {
            const total = todos.length;
            const completed = todos.filter(t => t.completed).length;
            const pending = total - completed;
            
            document.getElementById("totalCount").innerHTML = total;
            document.getElementById("completeCount").innerHTML = completed;
            document.getElementById("pendingCount").innerHTML = pending;
        }
        
        // FUNCTION: Allow Enter key to add todo
        function handleEnter(event) {
            if (event.key === "Enter") {
                addTodo();
            }
        }
        
        // Initialize
        renderTodos();
    </script>
</body>
</html>

<!-- 
    CONCEPTS IN THIS PROJECT:
    
    1. ARRAYS: let todos = [] - stores multiple items
    2. OBJECTS: { id, text, completed } - structured data
    3. METHODS:
       - .push() = add item to array
       - .filter() = keep items matching condition
       - .map() = transform items
    4. DOM MANIPULATION:
       - createElement() = create new element
       - appendChild() = add to page
       - innerHTML = change content
    5. EVENT HANDLING:
       - onclick, onchange, onkeypress
    6. CONDITIONAL LOGIC:
       - if/else statements
       - ternary operator: condition ? true : false
