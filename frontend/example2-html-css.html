    PHASE 2: HTML + CSS Styling (Week 5-6)
    Now we add colors and fonts!
    Focus: Learning CSS basics
-->

<!DOCTYPE html>
<html>
<head>
    <title>My Styled Page</title>
    <style>
        /* CSS Code: Colors, fonts, spacing */
        
        /* Style the whole page */
        body {
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        
        /* Style all headings */
        h1 {
            color: #2c3e50;
            font-size: 40px;
            text-align: center;
        }
        
        h2 {
            color: #3498db;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }
        
        /* Style paragraphs */
        p {
            color: #555;
            line-height: 1.8;
        }
        
        /* Style links */
        a {
            color: #e74c3c;
            text-decoration: none;
            font-weight: bold;
        }
        
        a:hover {
            text-decoration: underline;
            color: #c0392b;
        }
        
        /* Style buttons */
        button {
            background-color: #27ae60;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        
        button:hover {
            background-color: #229954;
        }
        
        /* Style lists */
        ul {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        li {
            margin: 8px 0;
        }
    </style>
</head>
<body>
    <h1>Welcome to My Styled Page</h1>
    
    <p>Hi! Now my page has colors and styling!</p>
    
    <h2>My Favorite Things:</h2>
    <ul>
        <li>🖥️ Coding</li>
        <li>☕ Coffee</li>
        <li>📚 Learning</li>
    </ul>
    
    <p><a href="https://www.google.com">Click here to visit Google</a></p>
    
    <button>Click Me</button>
</body>
</html>

<!-- 
    CSS CONCEPTS YOU LEARNED:
    - background-color = background color
    - color = text color
    - font-family = what font to use
    - font-size = how big text is
    - padding = space inside
    - margin = space outside
    - border = line around element
    - box-shadow = shadow effect
    - text-align = center, left, right
    - :hover = what happens when you mouse over
    
    PRACTICE: 
    ✓ Change colors (find hex codes at htmlcolorcodes.com)
    ✓ Make text bigger with font-size
    ✓ Add padding to make space around text
    ✓ Change button color on hover
-->
