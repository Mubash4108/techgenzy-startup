<!-- 
    PHASE 1: HTML ONLY (Week 1-2)
    This is the SIMPLEST starting point. No styling yet!
    Focus: Learning HTML tags
-->

<!DOCTYPE html>
<html>
<head>
    <title>My First Page</title>
</head>
<body>
    <!-- Heading -->
    <h1>Welcome to My Page</h1>
    
    <!-- Paragraph -->
    <p>Hi! This is my first webpage. I'm learning HTML.</p>
    
    <!-- List -->
    <h2>My Favorite Things:</h2>
    <ul>
        <li>Coding</li>
        <li>Coffee</li>
        <li>Learning</li>
    </ul>
    
    <!-- Link -->
    <p><a href="https://www.google.com">Click here to visit Google</a></p>
    
    <!-- Image -->
    <img src="https://via.placeholder.com/200" alt="Example image">
    
    <!-- Button (we'll make it work later with JavaScript) -->
    <button>Click Me</button>
</body>
</html>

<!-- 
    TO LEARN: Study each tag:
    - <h1> <h2> = headings
    - <p> = paragraph
    - <ul> <li> = bullet list
    - <a href=""> = link
    - <img src="" alt=""> = image
    - <button> = clickable button
    
    PRACTICE: Create your own page with:
    ✓ A title about yourself
    ✓ 3 paragraphs
    ✓ A list of favorites
    ✓ 1 image
    ✓ 2 links
-->
